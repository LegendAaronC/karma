<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karma | The best menu for Blooket</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050508;
    --surface: #0c0c14;
    --border: rgba(120,100,255,0.15);
    --border-bright: rgba(120,100,255,0.4);
    --purple: #7b5cf7;
    --purple-dim: rgba(123,92,247,0.12);
    --cyan: #00e5cc;
    --cyan-dim: rgba(0,229,204,0.08);
    --text: #e8e6ff;
    --muted: #6b6880;
    --card-bg: rgba(255,255,255,0.025);
  }

  html, body {
    width: 100%; min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    overflow-x: hidden;
  }

  /* === GRID BACKGROUND === */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(123,92,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(123,92,247,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* === GLOW ORBS === */
  .orb {
    position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
    filter: blur(100px); opacity: 0.18;
  }
  .orb-1 { width: 500px; height: 500px; background: #7b5cf7; top: -200px; left: -100px; }
  .orb-2 { width: 400px; height: 400px; background: #00e5cc; bottom: -150px; right: -80px; }

  /* === CANVAS PARTICLES === */
  canvas#particles { position: fixed; inset: 0; z-index: 0; opacity: 0.5; }

  /* === LOADER === */
  #loader {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }
  #loader.hidden { opacity: 0; visibility: hidden; }

  .loader-brand {
    font-family: 'Syne', sans-serif;
    font-size: 2.5rem; font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--purple), var(--cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    opacity: 0;
    animation: fadein 0.4s 0.3s ease forwards;
  }
  .loader-text {
    font-size: 0.75rem; color: var(--muted);
    letter-spacing: 0.15em;
    opacity: 0;
    animation: fadein 0.4s 0.6s ease forwards;
  }
  .loader-bar-wrap {
    width: 200px; height: 2px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px; overflow: hidden;
    opacity: 0;
    animation: fadein 0.4s 0.8s ease forwards;
  }
  .loader-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--purple), var(--cyan));
    border-radius: 2px;
    width: 0%;
    animation: load 1.6s 1s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  @keyframes load { to { width: 100%; } }
  @keyframes fadein { to { opacity: 1; } }

  /* === MAIN CONTENT === */
  #main {
    position: relative; z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px 80px;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  #main.visible { opacity: 1; }

  /* === NAV === */
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 32px 0 0;
    animation: slidedown 0.6s ease both;
  }
  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem; font-weight: 800;
    background: linear-gradient(135deg, var(--purple), var(--cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .nav-tag {
    font-size: 0.65rem; letter-spacing: 0.18em;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 5px 12px; border-radius: 100px;
    text-transform: uppercase;
  }
  @keyframes slidedown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: none; } }

  /* === HERO === */
  .hero {
    padding: 100px 0 80px;
    text-align: center;
  }
  .hero-eyebrow {
    font-size: 0.7rem; letter-spacing: 0.25em;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 24px;
    opacity: 0;
    animation: fadein 0.5s 2.8s ease forwards;
  }
  .hero-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(3.5rem, 10vw, 7rem);
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -3px;
    background: linear-gradient(160deg, #fff 30%, var(--purple) 80%, var(--cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 32px;
    opacity: 0;
    animation: riseup 0.8s 2.9s cubic-bezier(0.2,0,0,1) forwards;
  }
  .hero-sub {
    font-size: 0.85rem; color: var(--muted);
    line-height: 1.8; max-width: 440px;
    margin: 0 auto 48px;
    opacity: 0;
    animation: fadein 0.6s 3.2s ease forwards;
  }
  .hero-badges {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    opacity: 0;
    animation: fadein 0.6s 3.4s ease forwards;
  }
  .badge {
    font-size: 0.7rem; letter-spacing: 0.12em;
    padding: 7px 16px; border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--muted);
    text-transform: uppercase;
    transition: border-color 0.2s, color 0.2s;
  }
  .badge:hover { border-color: var(--border-bright); color: var(--text); }
  .badge.accent { border-color: rgba(0,229,204,0.3); color: var(--cyan); background: var(--cyan-dim); }

  @keyframes riseup { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: none; } }

  /* === DIVIDER === */
  .divider {
    width: 100%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-bright), transparent);
    margin: 8px 0 64px;
    opacity: 0;
    animation: fadein 0.6s 3.5s ease forwards;
  }

  /* === FEATURE CARDS === */
  .features {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 64px;
  }
  @media (max-width: 640px) { .features { grid-template-columns: 1fr; } }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    position: relative; overflow: hidden;
    opacity: 0;
    transition: border-color 0.25s, transform 0.25s, background 0.25s;
  }
  .card:hover {
    border-color: var(--border-bright);
    background: rgba(123,92,247,0.06);
    transform: translateY(-3px);
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--purple), transparent);
    opacity: 0; transition: opacity 0.25s;
  }
  .card:hover::before { opacity: 1; }
